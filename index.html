<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>PORTFOLIO | Yena Lee</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    width:100%;
    min-height:100vh;

    overflow:hidden;

    font-family:'Pretendard',sans-serif;

    background:#07090f;

    color:#fff;

    position:relative;
}

/* Background */

.background{
    position:absolute;
    inset:0;

    background:
    linear-gradient(
        rgba(7,9,15,.72),
        rgba(7,9,15,.82)
    ),
    url('portfolio 2025(3).jpg')
    center center / cover no-repeat;

    z-index:-5;

    transform:scale(1.03);

    filter:saturate(1.05);
}

/* Gradient Glow */

.glow{
    position:absolute;

    border-radius:50%;

    filter:blur(120px);

    opacity:.38;

    z-index:-4;
}

.glow.one{
    width:520px;
    height:520px;

    background:#bb9cff;

    top:-140px;
    left:-120px;
}

.glow.two{
    width:480px;
    height:480px;

    background:#8ec8ff;

    right:-120px;
    bottom:-120px;
}

.glow.three{
    width:320px;
    height:320px;

    background:#dab8ff;

    left:40%;
    top:35%;
}

/* Noise Texture */

.noise{
    position:absolute;
    inset:0;

    background-image:
    radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);

    background-size:4px 4px;

    opacity:.18;

    z-index:-3;
}

/* Layout */

.wrapper{
    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    padding:42px 54px;

    position:relative;
    z-index:10;
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:2.8rem;

    font-weight:300;

    letter-spacing:-0.08em;

    color:#ffffff;
}

.logo span{
    color:#b89cff;
}

.nav{
    display:flex;
    align-items:center;
    gap:36px;
}

.nav a{
    text-decoration:none;

    color:rgba(255,255,255,.72);

    font-size:.95rem;
    font-weight:500;

    transition:.3s ease;
}

.nav a:hover{
    color:#cdb4ff;
}

/* Hero */

.hero{
    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;
}

.hero-inner{
    width:100%;
    max-width:1200px;
}

/* Main Title */

.hero-title{
    font-family:'Montserrat',sans-serif;

    font-size:8rem;

    font-weight:800;

    letter-spacing:-0.08em;

    line-height:1;

    margin-bottom:26px;

    background:
    linear-gradient(
        90deg,
        #d2bbff,
        #aebfff,
        #8fd0ff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 30px rgba(180,160,255,.16);
}

/* Description */

.hero-sub{
    font-size:1.2rem;

    line-height:1.9;

    color:rgba(255,255,255,.74);

    margin-bottom:60px;
}

.hero-sub span{
    color:#c6b0ff;

    font-weight:700;
}

/* Buttons */

.button-group{
    display:flex;
    justify-content:center;
    align-items:center;

    gap:22px;

    flex-wrap:wrap;
}

.btn{
    min-width:220px;

    padding:20px 36px;

    border-radius:999px;

    text-decoration:none;

    display:flex;
    justify-content:center;
    align-items:center;

    gap:12px;

    font-size:1rem;
    font-weight:600;

    color:#ffffff;

    transition:.35s ease;

    backdrop-filter:blur(18px);

    border:1px solid rgba(207,186,255,.18);

    background:
    linear-gradient(
        135deg,
        rgba(202,182,255,.16),
        rgba(145,201,255,.12)
    );

    box-shadow:
    0 10px 30px rgba(0,0,0,.26);
}

.btn:hover{
    transform:translateY(-7px);

    border-color:#d1b8ff;

    box-shadow:
    0 22px 44px rgba(188,160,255,.18);

    background:
    linear-gradient(
        135deg,
        rgba(214,194,255,.22),
        rgba(161,216,255,.18)
    );
}

/* Footer */

.footer{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
}

.footer-left h3{
    font-size:1.8rem;

    font-weight:700;

    letter-spacing:.08em;

    margin-bottom:14px;
}

.footer-line{
    width:70px;
    height:2px;

    margin-bottom:18px;

    background:
    linear-gradient(
        90deg,
        #caaeff,
        #8fcfff
    );
}

.footer-left p{
    color:rgba(255,255,255,.54);

    line-height:1.8;

    font-size:.92rem;
}

.footer-right{
    color:rgba(255,255,255,.42);

    font-size:.92rem;
}

/* Responsive */

@media(max-width:1100px){

    .hero-title{
        font-size:5rem;
    }
}

@media(max-width:768px){

    body{
        overflow:auto;
    }

    .wrapper{
        padding:28px 20px;
    }

    .hero-title{
        font-size:3.6rem;
    }

    .hero-sub{
        font-size:1rem;
    }

    .button-group{
        flex-direction:column;
    }

    .btn{
        width:100%;
        max-width:340px;
    }

    .footer{
        flex-direction:column;
        align-items:flex-start;

        gap:20px;

        margin-top:40px;
    }
}

</style>
</head>

<body>

<div class="wrapper">

        <div class="logo">
            YL<span>.</span>
        </div>

        <nav class="nav">

    <a href="resume.html">

    </a>

    <a href="portfolio.html">

    </a>

    <a 
        href="https://www.linkedin.com/in/yena-lee0213"
        target="_blank">

        CONTACT

    </a>
        </nav>

    </header>

    <main class="hero">

        <div class="hero-inner">

            <h1 class="hero-title">

            </h1>

            <p class="hero-sub">
                데이터를 사용자 니즈로 분석하고<br>
                성과로 증명하는 기획자, <span>이예나</span>
            </p>

            <div class="button-group">

                <a href="resume.html" class="btn">
                    이력서
                </a>

                <a href="portfolio.html" class="btn">
                    포트폴리오
                </a>

                <a href="https://www.linkedin.com/in/yena-lee0213"
                    target="_blank"
                    class="btn">

                    CTA
                </a>

            </div>

        </div>

    </main>

    <footer class="footer">

        <div class="footer-left">

            <h3>YENA LEE</h3>

            <div class="footer-line"></div>

            <p>
                Data Meets Creative<br>
                © 2025 YENA LEE. All rights reserved.
            </p>

        </div>

        <div class="footer-right">
            Strategic Planning · Data Analysis · Creative Execution
        </div>

    </footer>

</div>

</body>
</html>
